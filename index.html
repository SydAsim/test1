<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav class="navbar">
<h2>🛡️ Secure Dashboard</h2>
<div class="user-profile">
<img id="avatarImg" src="default-avatar.png" alt="Avatar">
<span id="usernameDisplay">Guest</span>
</div>
</nav>
<div class="main-container">
<aside class="sidebar">
<div class="widget">
<h3>Search</h3>
<form action="" method="GET">
<input type="text" name="q" placeholder="Search..." id="searchInput">
<button type="submit">Go</button>
</form>
<div id="searchResults" class="search-results"></div>
</div>
<div class="widget">
<h3>Math</h3>
<input type="text" id="mathInput" placeholder="e.g., 5 + 10">
<button onclick="calculate()">Calculate</button>
<p>Result: <span id="mathResult" style="color:red;font-weight:bold;">0</span></p>
</div>
<div class="widget">
<h3>Links</h3>
<input type="text" id="redirectUrl" placeholder="Enter URL">
<button onclick="redirectToUrl()">Go Visit</button>
</div>
<div class="widget admin-widget">
<h3>Admin</h3>
<input type="password" id="adminPassword" placeholder="Password">
<button onclick="loginAdmin()">Login</button>
</div>
</aside>
<main class="content">
<div id="adminPanel" class="admin-panel" style="display:none;">
<h2>Admin Panel</h2>
<button onclick="clearAllData()">Wipe Data</button>
</div>
<div class="widget danger-zone">
<h3>Config</h3>
<textarea id="jsonConfig" placeholder='{"theme":"dark"}'></textarea>
<button onclick="importSettings()">Import Config</button>
</div>
<div class="widget danger-zone">
<h3>File Upload</h3>
<input type="file" id="bioFile" accept=".txt">
<button onclick="uploadBio()">Upload</button>
<div id="bioPreview" style="margin-top:10px;border:1px dashed red;padding:10px;background:white;"></div>
</div>
<div class="widget notes-section">
<h3>Create Note</h3>
<input type="text" id="noteTitle" placeholder="Title">
<textarea id="noteContent" placeholder="Note content..."></textarea>
<button onclick="addNote()">Publish</button>
<h3 style="margin-top:20px;">Notes</h3>
<div id="notesContainer" class="notes-container"></div>
</div>
</main>
</div>
<script src="script.js"></script>
</body>
</html>
